<!DOCTYPE html>
<html>
<head>
    <title>E-Dressing Room - Checkout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <link href="static/css/bootstrap.css" rel="stylesheet" type="text/css" media="all" />
    <link href="static/css/style.css" rel="stylesheet" type="text/css" media="all" />
    <link href="static/css/fasthover.css" rel="stylesheet" type="text/css" media="all" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="static/js/jquery.min.js"></script>
    <script src="static/js/bootstrap-3.1.1.min.js"></script>
    <style>
        /* Modern Typography & Base */
        * {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body { 
            background: #f8f9fa;
            min-height: 100vh;
            position: relative;
            color: #1e293b;
        }

        /* Enhanced Header */
        .header {
            background: white;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .w3l_logo h1 a {
            background: linear-gradient(135deg, #6366f1, #ec4899);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            font-size: 2rem;
            text-decoration: none;
        }

        /* Beautiful Banner */
        .banner10 { 
            background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
            color: white;
            padding: 60px 0;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .banner10::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        
        .banner10 h2 {
            font-size: 3rem;
            font-weight: 700;

        .logo:hover {
            transform: scale(1.05);
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            color: #4a5568;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .nav-links a:hover {
            color: #667eea;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* Banner */
        .banner {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.95), rgba(118, 75, 162, 0.95));
            padding: 60px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 200%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }
        
        .banner h1 {
            font-size: 3.5rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
            position: relative;
            z-index: 1;
        }

        /* Grid Layout */
        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 40px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Cart Section */
        .cart-section {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            animation: slideInLeft 0.6s ease-out;
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 3px solid #f0f4f8;
        }

        .section-header h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: #1a202c;
        }

        .item-count {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 700;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Cart Items */
        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .cart-item {
            background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
            border-radius: 20px;
            padding: 24px;
            display: grid;
            grid-template-columns: 100px 1fr auto;
            gap: 20px;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .cart-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(102, 126, 234, 0.1), transparent);
            transition: left 0.6s ease;
        }

        .cart-item:hover::before {
            left: 100%;
        }

        .cart-item:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.25);
            border-color: #667eea;
        }

        .cart-item.selected {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-color: #667eea;
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.3);
        }

        .item-image {
            width: 100px;
            height: 100px;
            border-radius: 16px;
            object-fit: cover;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease;
        }

        .cart-item:hover .item-image {
            transform: scale(1.1) rotate(3deg);
        }

        .item-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1a202c;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .item-path {
            font-size: 0.85rem;
            color: #718096;
            font-family: 'Courier New', monospace;
        }

        .item-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .item-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .btn-select {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
            box-shadow: 0 4px 15px rgba(72, 187, 120, 0.3);
        }

        .btn-select:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(72, 187, 120, 0.4);
        }

        .btn-buy {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-buy:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-remove {
            background: linear-gradient(135deg, #fc8181, #f56565);
            color: white;
            box-shadow: 0 4px 15px rgba(252, 129, 129, 0.3);
        }

        .btn-remove:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(252, 129, 129, 0.4);
        }

        /* Summary Sidebar */
        .summary-sidebar {
            position: sticky;
            top: 120px;
            height: fit-content;
            animation: slideInRight 0.6s ease-out;
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .summary-card {
            background: white;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            margin-bottom: 25px;
        }

        .summary-card h3 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1a202c;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 2px solid #f0f4f8;
            color: #4a5568;
            font-weight: 600;
        }

        .summary-row:last-child {
            border-bottom: none;
        }

        .summary-row.total {
            font-size: 1.5rem;
            font-weight: 900;
            color: #1a202c;
            padding-top: 20px;
            margin-top: 10px;
            border-top: 3px solid #667eea;
        }

        .action-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 20px 60px rgba(102, 126, 234, 0.3);
            color: white;
        }

        .action-card h3 {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .action-card p {
            font-size: 0.95rem;
            margin-bottom: 20px;
            opacity: 0.95;
            line-height: 1.6;
        }

        .btn-primary {
            background: white;
            color: #667eea;
            padding: 16px 24px;
            font-size: 1rem;
            width: 100%;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 16px 24px;
            font-size: 1rem;
            width: 100%;
            margin-top: 12px;
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        /* Empty Cart */
        .empty-cart {
            text-align: center;
            padding: 80px 40px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .empty-cart i {
            font-size: 5rem;
            color: #cbd5e0;
            margin-bottom: 25px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .empty-cart h3 {
            font-size: 2rem;
            font-weight: 800;
            color: #4a5568;
            margin-bottom: 15px;
        }

        .empty-cart p {
            color: #718096;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }

            .summary-sidebar {
                position: static;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                padding: 15px 20px;
            }

            .nav-links {
                gap: 15px;
            }

            .banner h1 {
                font-size: 2.5rem;
            }

            .container {
                padding: 20px;
            }

            .cart-section, .summary-card, .action-card {
                padding: 25px;
            }

            .cart-item {
                grid-template-columns: 80px 1fr;
                gap: 15px;
            }

            .item-actions {
                grid-column: 1 / -1;
                flex-direction: row;
                flex-wrap: wrap;
            }

            .btn {
                flex: 1;
                min-width: 120px;
            }
        }

        @media (max-width: 480px) {
            .banner h1 {
                font-size: 2rem;
            }

            .cart-item {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .item-image {
                margin: 0 auto;
            }

            .item-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-content">
            <a href="/" class="logo">
                <i class="fas fa-tshirt"></i>
                E-Dressing Room
            </a>
            <div class="nav-links">
                <a href="/"><i class="fas fa-home"></i> Home</a>
                <a href="/product"><i class="fas fa-shopping-bag"></i> Products</a>
                <a href="/features"><i class="fas fa-magic"></i> Features</a>
                <a href="/contact"><i class="fas fa-envelope"></i> Contact</a>
            </div>
        </div>
    </div>

    <!-- Banner -->
    <div class="banner">
        <h1><i class="fas fa-shopping-cart"></i> Your Shopping Cart</h1>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div id="checkout-content">
            <!-- Will be populated by JavaScript -->
        </div>
    </div>

    <script>
        let CART = [];
        let selectedItem = null;

        // Load cart from localStorage
        function loadCart() {
            const savedCart = localStorage.getItem('cart');
            if (savedCart) {
                CART = JSON.parse(savedCart);
            }
            displayCart();
        }

        // Save cart to localStorage
        function saveCart() {
            localStorage.setItem('cart', JSON.stringify(CART));
        }

        // Format item name
        function formatItemName(path) {
            const fileName = path.split('/').pop().replace('.png', '').replace(/\d+/g, '').trim();
            return fileName.charAt(0).toUpperCase() + fileName.slice(1).replace(/([A-Z])/g, ' $1');
        }

        // Display cart
        function displayCart() {
            const contentDiv = document.getElementById('checkout-content');

            if (CART.length === 0) {
                contentDiv.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-cart"></i>
                        <h3>Your cart is empty</h3>
                        <p>Looks like you haven't added any items yet. Start shopping!</p>
                        <a href="/product" class="btn btn-buy" style="display: inline-flex; text-decoration: none; width: auto;">
                            <i class="fas fa-plus"></i> Start Shopping
                        </a>
                    </div>
                `;
                return;
            }

            let cartItemsHTML = '';
            CART.forEach((item, index) => {
                const itemName = formatItemName(item);
                cartItemsHTML += `
                    <div class="cart-item" id="cart-item-${index}">
                        <img src="/${item}" alt="${itemName}" class="item-image" onerror="this.src='/static/images/placeholder.png'">
                        <div class="item-details">
                            <div class="item-name">
                                <i class="fas fa-tag"></i>
                                ${itemName}
                            </div>
                            <div class="item-path">${item}</div>
                            <div class="item-badge">
                                <i class="fas fa-star"></i>
                                Premium
                            </div>
                        </div>
                        <div class="item-actions">
                            <button class="btn btn-select" onclick="selectItem(${index})">
                                <i class="fas fa-check-circle"></i> Select
                            </button>
                            <button class="btn btn-buy" onclick="buyItem(${index})">
                                <i class="fas fa-shopping-bag"></i> Buy
                            </button>
                            <button class="btn btn-remove" onclick="removeItem(${index})">
                                <i class="fas fa-trash"></i> Remove
                            </button>
                        </div>
                    </div>
                `;
            });

            contentDiv.innerHTML = `
                <div class="checkout-grid">
                    <div class="cart-section">
                        <div class="section-header">
                            <h2>Cart Items</h2>
                            <span class="item-count">${CART.length} ${CART.length === 1 ? 'Item' : 'Items'}</span>
                        </div>
                        <div class="cart-items">
                            ${cartItemsHTML}
                        </div>
                    </div>
                    
                    <div class="summary-sidebar">
                        <div class="summary-card">
                            <h3><i class="fas fa-receipt"></i> Order Summary</h3>
                            <div class="summary-row">
                                <span>Items in Cart</span>
                                <span>${CART.length}</span>
                            </div>
                            <div class="summary-row">
                                <span>Selected Item</span>
                                <span id="selected-display">None</span>
                            </div>
                            <div class="summary-row total">
                                <span>Total Items</span>
                                <span>${CART.length}</span>
                            </div>
                        </div>
                        
                        <div class="action-card">
                            <h3><i class="fas fa-camera"></i> Virtual Try-On</h3>
                            <p>Experience AR-powered virtual try-on. Select an item and see how it looks on you in real-time!</p>
                            <button id="try-on-btn" class="btn btn-primary" onclick="tryOnSelected()" disabled>
                                <i class="fas fa-eye"></i> Try On Selected
                            </button>
                            <button class="btn btn-secondary" onclick="buyAll()">
                                <i class="fas fa-shopping-cart"></i> Purchase All
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Select item for try-on
        function selectItem(index) {
            selectedItem = CART[index];

            // Remove previous selection
            document.querySelectorAll('.cart-item').forEach(item => {
                item.classList.remove('selected');
            });

            // Add selection to current item
            const selectedElement = document.getElementById(`cart-item-${index}`);
            selectedElement.classList.add('selected');

            // Update UI
            document.getElementById('selected-display').textContent = formatItemName(selectedItem);
            const tryOnBtn = document.getElementById('try-on-btn');
            tryOnBtn.disabled = false;
            tryOnBtn.innerHTML = '<i class="fas fa-eye"></i> Try On Selected';

            // Smooth scroll to sidebar on mobile
            if (window.innerWidth < 1200) {
                document.querySelector('.summary-sidebar').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        // Try on selected item - ALIGNED WITH FLASK ROUTE
        function tryOnSelected() {
            if (!selectedItem) {
                alert('⚠️ Please select an item to try on first!');
                return;
            }

            const tryOnBtn = document.getElementById('try-on-btn');
            const originalText = tryOnBtn.innerHTML;
            tryOnBtn.innerHTML = '<span class="loading"></span> Loading...';
            tryOnBtn.disabled = true;

            // Flask route expects: /tryon/<path:file_path> with slashes replaced by commas
            // Example: static/images/shirt1.png -> static,images,shirt1.png
            console.log('Original path:', selectedItem);
            
            // Remove leading slash if present
            let cleanPath = selectedItem.replace(/^\//, '');
            console.log('Clean path:', cleanPath);
            
            // Replace slashes with commas for Flask route
            const flaskPath = cleanPath.replace(/\//g, ',');
            console.log('Flask path:', flaskPath);
            
            const finalUrl = '/tryon/' + flaskPath;
            console.log('Final URL:', finalUrl);

            // Open in new window (Flask will handle the try-on)
            setTimeout(() => {
                window.open(finalUrl, '_blank');
                tryOnBtn.innerHTML = originalText;
                tryOnBtn.disabled = false;
            }, 1000);
        }

        // Buy specific item
        function buyItem(index) {
            const item = CART[index];
            const itemName = formatItemName(item);

            if (confirm(`🛍️ Purchase Confirmation\n\nBuy "${itemName}"?\n\n(Demo - no payment processed)`)) {
                alert(`🎉 Success!\n\n"${itemName}" purchased!\n\n(Demo mode)`);
                removeItem(index, true);
            }
        }

        // Buy all items - COULD POST TO FLASK IF NEEDED
        function buyAll() {
            if (CART.length === 0) return;

            if (confirm(`🛒 Purchase All Items\n\nBuy all ${CART.length} items?\n\n(Demo - no payment processed)`)) {
                // Optional: Send cart data to Flask
                // fetch('/buyall', {
                //     method: 'POST',
                //     headers: {'Content-Type': 'application/json'},
                //     body: JSON.stringify({cart: CART})
                // });
                
                alert(`🎉 Congratulations!\n\nAll ${CART.length} items purchased!\nThank you for shopping!\n\n(Demo mode)`);
                CART = [];
                saveCart();
                displayCart();
            }
        }

        // Remove item from cart
        function removeItem(index, skipConfirm = false) {
            const item = CART[index];
            const itemName = formatItemName(item);

            if (!skipConfirm && !confirm(`🗑️ Remove "${itemName}"?`)) {
                return;
            }

            CART.splice(index, 1);
            saveCart();
            displayCart();
            selectedItem = null;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadCart();
        });
    </script>
</body>
</html>
